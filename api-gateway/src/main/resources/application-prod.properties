# ===============================
# API Gateway (Production)
# ===============================
spring.application.name=api-gateway
server.port=${PORT:8080}

# ===============================
# JWT
# ===============================
spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET}

# ===============================
# Microservice URLs (Render)
# ===============================
course.service.url=https://classmate3000-course-service.onrender.com/api/v1
courseprogress.service.url=https://classmate3000-courseprogress-service.onrender.com/api/v1
task.service.url=https://classmate3000-task-service.onrender.com/api/v1
reminder.service.url=https://classmate3000-reminder-service.onrender.com/api/v1
user.service.url=https://classmate3000-user-service.onrender.com/api/v1

# ===============================
# Swagger aggregation (optional but nice)
# ===============================
springdoc.swagger-ui.urls[0].name=Course Service
springdoc.swagger-ui.urls[0].url=/course-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=CourseProgress Service
springdoc.swagger-ui.urls[1].url=/courseprogress-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=Task Service
springdoc.swagger-ui.urls[2].url=/task-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=Reminder Service
springdoc.swagger-ui.urls[3].url=/reminder-service/v3/api-docs

springdoc.swagger-ui.display-default-url=false
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# Gateway Timeout (IMPORTANT)
# ===============================
spring.cloud.gateway.httpclient.connect-timeout=20000
spring.cloud.gateway.httpclient.response-timeout=30s